<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doutor Café</title>
<style>
body{font-family:Arial,sans-serif;background:#f0f7f1;margin:0;padding:0;display:flex;flex-direction:column;align-items:center;}
.header{width:100%;background:linear-gradient(170deg,#0f2e14,#1e5c28);padding:40px 24px;text-align:center;border-radius:0 0 40px 40px;}
h1{color:white;font-size:30px;margin:0;}
h1 span{color:#8de89a;}
.sub{color:rgba(255,255,255,0.6);margin-top:6px;font-size:14px;}
.corpo{width:100%;max-width:420px;padding:24px 20px;display:flex;flex-direction:column;gap:12px;}
button{width:100%;padding:18px;border:none;border-radius:20px;font-size:18px;font-weight:800;cursor:pointer;}
.b1{background:linear-gradient(145deg,#2d8a3e,#1a5228);color:white;padding:28px;font-size:20px;}
.b2{background:white;color:#1a3a1f;border:2px solid #b8dbbe !important;}
.b3{background:#1a3a1f;color:white;}
.b4{background:#f0f7f1;color:#1a3a1f;border:2px solid #b8dbbe !important;}
#spinner{display:none;text-align:center;padding:24px;color:#1a3a1f;font-size:18px;font-weight:800;}
#resultado{display:none;background:white;border-radius:20px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,0.1);}
#resultado h2{font-size:22px;margin-bottom:10px;}
#resultado p{font-size:15px;line-height:1.6;color:#333;}
input{display:none;}
</style>
</head>
<body>
<div class="header">
<h1>Doutor <span>Café</span></h1>
<div class="sub">O agrônomo no seu bolso 🌿</div>
</div>
<div class="corpo">
<input id="cam" type="file" accept="image/*" capture="environment">
<input id="gal" type="file" accept="image/*">
<button class="b1" id="btnCam">📷 FOTOGRAFAR A FOLHA</button>
<button class="b2" id="btnGal">🖼️ Escolher da Galeria</button>
<div id="spinner">🔍 Analisando a folha...</div>
<div id="resultado"></div>
</div>
<script>
document.getElementById("btnCam").addEventListener("click", function() {
  document.getElementById("cam").click();
});
document.getElementById("btnGal").addEventListener("click", function() {
  document.getElementById("gal").click();
});
document.getElementById("cam").addEventListener("change", function(e) {
  if (e.target.files[0]) processar(e.target.files[0]);
});
document.getElementById("gal").addEventListener("change", function(e) {
  if (e.target.files[0]) processar(e.target.files[0]);
});

function processar(file) {
  document.getElementById("spinner").style.display = "block";
  document.getElementById("resultado").style.display = "none";
  var reader = new FileReader();
  reader.onload = function(e) {
    var b64 = e.target.result.split(",")[1];
    fetch("https://doutor-cafe-production.up.railway.app/diagnostico", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({imagem: b64, tipo: file.type})
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      document.getElementById("spinner").style.display = "none";
      var div = document.getElementById("resultado");
      div.style.display = "block";
      var emojis = {ferrugem:"🟠",bicho:"🪲",nitrogenio:"🌿",magnesio:"🟡",saudavel:"✅"};
      var emoji = emojis[data.diagnostico] || "🌿";
      var texto = data.acao || data.erro || "Tente novamente.";
      div.innerHTML = "<h2>" + emoji + " " + (data.diagnostico || "").toUpperCase() + "</h2><p>" + texto + "</p><button class='b3' onclick='falar(\"" + texto.replace(/"/g,"") + "\")'>🔊 Ouvir em voz alta</button><button class='b4' onclick='resetar()' style='margin-top:8px'>📷 Nova análise</button>";
      falar(texto);
    })
    .catch(function() {
      document.getElementById("spinner").style.display = "none";
      var div = document.getElementById("resultado");
      div.style.display = "block";
      div.innerHTML = "<p>Erro ao analisar. Verifique sua conexão e tente novamente.</p>";
    });
  };
  reader.readAsDataURL(file);
}

function falar(texto) {
  if (window.speechSynthesis) {
    window.speechSynthesis.cancel();
    var msg = new SpeechSynthesisUtterance(texto);
    msg.lang = "pt-BR";
    msg.rate = 0.85;
    window.speechSynthesis.speak(msg);
  }
}

function resetar() {
  document.getElementById("resultado").style.display = "none";
  document.getElementById("cam").value = "";
  document.getElementById("gal").value = "";
}
</script>
</body>
</html>
