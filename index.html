<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doutor Café</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
 --verde: #1a5c2a;
 --verde-claro: #2d8a3e;
 --verde-neon: #5dde74;
 --creme: #f5f0e8;
 --marrom: #3d2b1a;
 --cinza: #7a8a7c;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--creme); min-height: 100vh; overflow-x: hidden; }

.header {
 width: 100%;
 position: relative;
 overflow: hidden;
 padding: 28px 24px 40px;
 text-align: center;
 display: flex;
 flex-direction: column;
 align-items: center;
 justify-content: center;
}

.header::before {
 content: '';
 position: absolute;
 inset: 0;
 background: linear-gradient(160deg, #0d3318 0%, #1a5c2a 40%, #0f2e14 70%, #0a1f0e 100%);
 z-index: 0;
}

.header-bg {
 position: absolute;
 inset: 0;
 z-index: 1;
 pointer-events: none;
 width: 100%;
 height: 100%;
}

.header-content { position: relative; z-index: 2; }

.logo-icon { font-size: 38px; display: block; margin-bottom: 6px; animation: float 3s ease-in-out infinite; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5)); }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

.header h1 { font-family: 'Playfair Display', serif; font-size: 34px; color: white; letter-spacing: -0.5px; text-shadow: 0 2px 16px rgba(0,0,0,0.5); }
.header h1 span { color: var(--verde-neon); }
.header .sub { color: rgba(255,255,255,0.55); font-size: 12px; margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; }
.regiao-tag { display: inline-block; margin-top: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 4px 14px; font-size: 12px; color: rgba(255,255,255,0.85); }

.wave { display: block; height: 36px; background: var(--creme); clip-path: ellipse(55% 100% at 50% 100%); margin-top: -1px; position: relative; z-index: 3; }

.corpo { max-width: 420px; margin: 0 auto; padding: 16px 20px 40px; display: flex; flex-direction: column; gap: 12px; }

.secao-titulo { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--cinza); padding: 4px 4px 0; }

.btn-foto { background: linear-gradient(135deg, var(--verde-claro), var(--verde)); color: white; border: none; border-radius: 16px; padding: 18px 24px; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 12px; width: 100%; box-shadow: 0 4px 16px rgba(26,92,42,0.25); transition: transform 0.15s; }
.btn-foto:active { transform: scale(0.97); }

.btn-video { background: linear-gradient(135deg, #1565c0, #0d47a1); color: white; border: none; border-radius: 16px; padding: 18px 24px; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 12px; width: 100%; box-shadow: 0 4px 16px rgba(13,71,161,0.25); transition: transform 0.15s; }
.btn-video:active { transform: scale(0.97); }

.btn-galeria { background: white; color: var(--verde); border: 2px solid #c8ddc8; border-radius: 16px; padding: 14px 24px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 10px; width: 100%; transition: transform 0.15s; }
.btn-galeria:active { transform: scale(0.97); }

.solo-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.btn-solo { background: linear-gradient(135deg, #795548, #4e342e); color: white; border: none; border-radius: 16px; padding: 16px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; flex-direction: column; align-items: flex-start; gap: 6px; box-shadow: 0 4px 16px rgba(78,52,46,0.25); transition: transform 0.15s; }
.btn-solo:active { transform: scale(0.97); }

.btn-solo-gal { background: white; color: #4e342e; border: 2px solid #d7c4bb; border-radius: 16px; padding: 16px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; flex-direction: column; align-items: flex-start; gap: 6px; transition: transform 0.15s; }
.btn-solo-gal:active { transform: scale(0.97); }

.btn-icon { font-size: 22px; flex-shrink: 0; }
.btn-text { text-align: left; line-height: 1.3; }
.btn-text small { display: block; font-weight: 400; font-size: 11px; opacity: 0.7; margin-top: 2px; }

input { display: none; }

.dica { background: white; border-radius: 14px; padding: 12px 14px; display: flex; align-items: flex-start; gap: 10px; border-left: 3px solid var(--verde-neon); }
.dica-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.dica p { font-size: 12px; color: var(--cinza); line-height: 1.5; }
.dica strong { color: var(--marrom); }

#spinner { display: none; background: white; border-radius: 20px; padding: 32px 20px; text-align: center; box-shadow: 0 2px 16px rgba(0,0,0,0.07); }
.spinner-folha { font-size: 40px; animation: spin-pulse 1.2s ease-in-out infinite; display: block; margin-bottom: 12px; }
@keyframes spin-pulse { 0%, 100% { transform: scale(1) rotate(0deg); opacity: 1; } 50% { transform: scale(1.15) rotate(10deg); opacity: 0.7; } }
#spinner p { color: var(--verde); font-weight: 700; font-size: 16px; }
#spinner small { color: var(--cinza); font-size: 12px; margin-top: 4px; display: block; }

#resultado { display: none; }
.card-resultado { background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.1); animation: slideUp 0.4s ease; }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.card-topo { padding: 24px 20px 20px; display: flex; align-items: center; gap: 16px; }
.card-emoji { font-size: 52px; flex-shrink: 0; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15)); }
.card-titulo h2 { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--marrom); text-transform: capitalize; }
.card-titulo .categoria { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--cinza); margin-top: 2px; }
.badges { padding: 0 20px 16px; display: flex; gap: 8px; flex-wrap: wrap; }
.badge { border-radius: 30px; padding: 5px 12px; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 4px; }
.badge-estagio { background: #fff3e0; color: #e65100; }
.badge-confianca-alta { background: #e8f5e9; color: #2e7d32; }
.badge-confianca-media { background: #fff8e1; color: #f57f17; }
.badge-confianca-baixa { background: #fce4ec; color: #c62828; }
.badge-regiao { background: #e3f2fd; color: #1565c0; }
.badge-video { background: #e8eaf6; color: #283593; }
.badge-solo { background: #efebe9; color: #4e342e; }
.visto-box { margin: 0 20px 16px; background: var(--creme); border-radius: 12px; padding: 12px 14px; display: flex; gap: 10px; align-items: flex-start; }
.visto-box .visto-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.visto-box p { font-size: 13px; color: #555; line-height: 1.5; font-style: italic; }
.divisor { height: 1px; background: #f0f0f0; margin: 0 20px; }
.acao-box { padding: 16px 20px; }
.acao-box h3 { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--cinza); margin-bottom: 8px; }
.acao-box p { font-size: 15px; color: var(--marrom); line-height: 1.6; font-weight: 500; }
.estagio-box { padding: 0 20px 16px; }
.estagio-box h3 { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--cinza); margin-bottom: 8px; }
.estagio-bar { display: flex; gap: 4px; }
.estagio-seg { flex: 1; height: 8px; border-radius: 4px; background: #e8e8e8; transition: background 0.3s; }
.btns-resultado { padding: 0 20px 20px; display: flex; gap: 10px; }
.btn-voz { flex: 1; background: var(--verde); color: white; border: none; border-radius: 14px; padding: 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
.btn-nova { flex: 1; background: var(--creme); color: var(--verde); border: 2px solid #c8ddc8; border-radius: 14px; padding: 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
.solo-grid { padding: 0 20px 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.solo-item { background: var(--creme); border-radius: 10px; padding: 10px 12px; }
.solo-item .solo-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--cinza); }
.solo-item .solo-valor { font-size: 16px; font-weight: 700; color: var(--marrom); margin-top: 2px; }
.solo-item .solo-status { font-size: 11px; margin-top: 2px; }
.solo-ok { color: #2e7d32; }
.solo-baixo { color: #c62828; }
.solo-alto { color: #e65100; }
canvas { display: none; }
</style>
</head>

var dadosGPS = { lat: null, lon: null, regiao: null, altitude: null };
function identificarRegiao(lat, lon) {
 if (lat >= -20.5 && lat <= -15.0 && lon >= -50.0 && lon <= -44.0) return "Cerrado Mineiro";
 if (lat >= -22.5 && lat <= -19.5 && lon >= -46.5 && lon <= -43.5) return "Sul de Minas";
 if (lat >= -21.5 && lat <= -19.0 && lon >= -48.5 && lon <= -46.0) return "Mogiana";
 if (lat >= -20.0 && lat <= -17.0 && lon >= -42.5 && lon <= -40.0) return "Matas de Minas";
 if (lat >= -15.0 && lat <= -10.0 && lon >= -41.5 && lon <= -38.5) return "Chapada Diamantina";
 if (lat >= -12.0 && lat <= -8.0  && lon >= -40.0 && lon <= -36.0) return "Planalto da Bahia";
 if (lat >= -12.0 && lat <= -6.0  && lon >= -62.0 && lon <= -56.0) return "Rondônia";
 if (lat >= -22.0 && lat <= -19.0 && lon >= -52.0 && lon <= -48.0) return "Alta Paulista";
 if (lat >= -25.0 && lat <= -21.0 && lon >= -54.0 && lon <= -49.0) return "Norte do Paraná";
 if (lat >= -21.0 && lat <= -17.0 && lon >= -41.5 && lon <= -39.0) return "Espírito Santo";
 return "Região Cafeeira";
}
function obterGPS() {
 if (!navigator.geolocation) { document.getElementById("regiaoTag").textContent = "📍 GPS não disponível"; return; }
 navigator.geolocation.getCurrentPosition(
   function(pos) {
     dadosGPS.lat = pos.coords.latitude;
     dadosGPS.lon = pos.coords.longitude;
     dadosGPS.altitude = pos.coords.altitude ? Math.round(pos.coords.altitude) : null;
     dadosGPS.regiao = identificarRegiao(dadosGPS.lat, dadosGPS.lon);
     var tag = "📍 " + dadosGPS.regiao;
     if (dadosGPS.altitude) tag += " · " + dadosGPS.altitude + "m";
     document.getElementById("regiaoTag").textContent = tag;
   },
   function() { document.getElementById("regiaoTag").textContent = "📍 Localização não obtida"; },
   { timeout: 8000, enableHighAccuracy: false }
 );
}
obterGPS();

document.getElementById("btnGal").addEventListener("click", function() { document.getElementById("gal").click(); });

function processar(file, isVideo) {
 document.getElementById("spinner").style.display = "block";
 document.getElementById("resultado").style.display = "none";
 document.getElementById("spinnerTexto").textContent = "Analisando a folha...";
 document.getElementById("spinnerSub").textContent = "Identificando sintomas e comparando padrões";
 var reader = new FileReader();
 reader.onload = function(e) {
   var b64 = e.target.result.split(",")[1];
   var body = { imagem: b64, tipo: file.type };
   if (dadosGPS.regiao) body.regiao = dadosGPS.regiao;
   if (dadosGPS.altitude) body.altitude = dadosGPS.altitude;
   fetch("https://doutor-cafe-production.up.railway.app/diagnostico", {
     method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(body)
   })
   .then(function(r) { return r.json(); })
   .then(function(data) { document.getElementById("spinner").style.display = "none"; mostrarResultado(data, isVideo); })
   .catch(function() { document.getElementById("spinner").style.display = "none"; mostrarErro(); });
 };
 reader.readAsDataURL(file);
}

function processarSolo(file) {
 document.getElementById("spinner").style.display = "block";
 document.getElementById("resultado").style.display = "none";
 document.getElementById("spinnerTexto").textContent = "Lendo laudo de solo...";
 document.getElementById("spinnerSub").textContent = "Interpretando valores e calculando recomendações";
 var reader = new FileReader();
 reader.onload = function(e) {
   var b64 = e.target.result.split(",")[1];
   var body = { imagem: b64, tipo: file.type };
   if (dadosGPS.regiao) body.regiao = dadosGPS.regiao;

   })

   .then(function(data) { document.getElementById("spinner").style.display = "none"; mostrarResultadoSolo(data); })
   .catch(function() { document.getElementById("spinner").style.display = "none"; mostrarErro(); });
 };
 reader.readAsDataURL(file);
}

function processarVideo(file) {
 document.getElementById("spinner").style.display = "block";
 document.getElementById("resultado").style.display = "none";
 document.getElementById("spinnerTexto").textContent = "Extraindo frames do vídeo...";
 document.getElementById("spinnerSub").textContent = "Analisando múltiplos ângulos para maior precisão";
 var video = document.createElement("video");
 var canvas = document.getElementById("canvas");
 var ctx = canvas.getContext("2d");
 var url = URL.createObjectURL(file);
 video.src = url; video.muted = true;
 video.addEventListener("loadedmetadata", function() {
   var duration = video.duration;
   var frames = [];
   var tempos = [duration*0.15, duration*0.35, duration*0.60, duration*0.85];
   var idx = 0;
   function capturarFrame() {
     if (idx >= tempos.length) { URL.revokeObjectURL(url); enviarFrames(frames); return; }
     video.currentTime = tempos[idx];
   }
   video.addEventListener("seeked", function() {
     canvas.width = 640; canvas.height = 480;
     ctx.drawImage(video, 0, 0, 640, 480);
     frames.push(canvas.toDataURL("image/jpeg", 0.7).split(",")[1]);
     idx++; capturarFrame();
   });
   capturarFrame();
 });
 video.load();
}

function enviarFrames(frames) {
 document.getElementById("spinnerTexto").textContent = "Analisando " + frames.length + " ângulos...";
 document.getElementById("spinnerSub").textContent = "Comparando padrões para diagnóstico preciso";
 var body = { frames: frames, tipo: "image/jpeg" };
 if (dadosGPS.regiao) body.regiao = dadosGPS.regiao;
 if (dadosGPS.altitude) body.altitude = dadosGPS.altitude;
 fetch("https://doutor-cafe-production.up.railway.app/diagnostico-video", {
   method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(body)
 })
 .then(function(r) { return r.json(); })
 .then(function(data) { document.getElementById("spinner").style.display = "none"; mostrarResultado(data, true); })
 .catch(function() { document.getElementById("spinner").style.display = "none"; mostrarErro(); });
}

function mostrarResultadoSolo(data) {
 var div = document.getElementById("resultado");
 div.style.display = "block";
 var acao = data.acao || "Consulte um agrônomo para mais detalhes.";
 var textoVoz = "Análise de solo. " + acao;
 var html = '<div class="card-resultado">';
 html += '<div class="card-topo"><span class="card-emoji">🧪</span>';
 html += '<div class="card-titulo"><h2>Análise de Solo</h2><div class="categoria">Recomendação para Café</div></div></div>';
 html += '<div class="badges"><span class="badge badge-solo">🌱 Laudo Interpretado</span>';
 if (dadosGPS.regiao) html += '<span class="badge badge-regiao">📍 ' + dadosGPS.regiao + '</span>';
 html += '</div>';
 if (data.valores) {
   html += '<div class="solo-grid">';
   for (var k in data.valores) {
     var v = data.valores[k];
     var sc = v.status === "ok" ? "solo-ok" : v.status === "baixo" ? "solo-baixo" : "solo-alto";
     var st = v.status === "ok" ? "✓ Adequado" : v.status === "baixo" ? "↓ Baixo" : "↑ Alto";
     html += '<div class="solo-item"><div class="solo-label">' + k + '</div><div class="solo-valor">' + v.valor + '</div><div class="solo-status ' + sc + '">' + st + '</div></div>';
   }
   html += '</div>';
 }
 html += '<div class="divisor"></div>';
 html += '<div class="acao-box"><h3>Recomendação</h3><p>' + acao + '</p></div>';
 html += '<div class="btns-resultado"><button class="btn-voz" onclick="falar(\'' + textoVoz.replace(/'/g, "\\'") + '\')">🔊 Ouvir</button>';
 html += '<button class="btn-nova" onclick="resetar()">📷 Nova análise</button></div></div>';
 div.innerHTML = html;
 falar(textoVoz);
}

function mostrarResultado(data, isVideo) {
 var div = document.getElementById("resultado");
 div.style.display = "block";
 var diag = data.diagnostico || "saudavel";
 var emoji = EMOJIS[diag] || "🌿";
 var cat = CATEGORIAS[diag] || "Análise";
 var nomeVoz = NOMES_VOZ[diag] || diag;
 var estagio = data.estagio || 1;
 var confianca = data.confianca || "media";
 var visto = data.visto || "";
 var acao = data.acao || "Tente novamente.";
 var nome = diag.replace(/_/g, " ");
 var badgeClass = "badge-confianca-" + confianca;
 var badgeTexto = confianca === "alta" ? "✓ Alta confiança" : confianca === "media" ? "~ Média confiança" : "! Baixa confiança";
 var barras = "";
 for (var i = 1; i <= 5; i++) {
   var cor = i <= estagio ? CORES_ESTAGIO[estagio-1] : "#e8e8e8";
   barras += '<div class="estagio-seg" style="background:' + cor + '"></div>';
 }
 var textoVoz = nomeVoz + ". " + acao;
 var html = '<div class="card-resultado">';
 html += '<div class="card-topo"><span class="card-emoji">' + emoji + '</span>';
 html += '<div class="card-titulo"><h2>' + nome + '</h2><div class="categoria">' + cat + '</div></div></div>';
 html += '<div class="badges"><span class="badge badge-estagio">📊 Estágio ' + estagio + '/5</span>';
 html += '<span class="badge ' + badgeClass + '">' + badgeTexto + '</span>';
 if (dadosGPS.regiao) html += '<span class="badge badge-regiao">📍 ' + dadosGPS.regiao + '</span>';
 if (isVideo) html += '<span class="badge badge-video">🎥 Análise por vídeo</span>';
 html += '</div>';
 if (visto) html += '<div class="visto-box"><span class="visto-icon">👁️</span><p>"' + visto + '"</p></div>';
 html += '<div class="divisor"></div>';
 html += '<div class="estagio-box" style="padding-top:16px"><h3>Gravidade</h3><div class="estagio-bar">' + barras + '</div></div>';
 html += '<div class="divisor"></div>';
 html += '<div class="acao-box"><h3>O que fazer agora</h3><p>' + acao + '</p></div>';
 html += '<div class="btns-resultado"><button class="btn-voz" onclick="falar(\'' + textoVoz.replace(/'/g, "\\'") + '\')">🔊 Ouvir</button>';
 html += '<button class="btn-nova" onclick="resetar()">📷 Nova análise</button></div></div>';
 div.innerHTML = html;
 falar(textoVoz);
}

function mostrarErro() {
 var div = document.getElementById("resultado");
 div.style.display = "block";
 div.innerHTML = '<div class="card-resultado"><div class="acao-box"><p>⚠️ Erro ao analisar. Verifique sua conexão e tente novamente.</p></div><div class="btns-resultado"><button class="btn-nova" onclick="resetar()">📷 Tentar novamente</button></div></div>';
}

function falar(texto) {
 if (window.speechSynthesis) {
   window.speechSynthesis.cancel();
   var msg = new SpeechSynthesisUtterance(texto);
   msg.lang = "pt-BR"; msg.rate = 0.85;
   window.speechSynthesis.speak(msg);
 }
}

function resetar() {
 document.getElementById("resultado").style.display = "none";
 document.getElementById("cam").value = "";
 document.getElementById("gal").value = "";
 document.getElementById("vid").value = "";
 document.getElementById("solo").value = "";
 document.getElementById("soloGal").value = "";
 window.scrollTo(0, 0);
}
